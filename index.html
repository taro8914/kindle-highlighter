<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kindle ハイライトパーサー</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f6f7f8;
    --fg: #1a1a1a;
    --fg2: #555;
    --fg3: #999;
    --border: #ddd;
    --border2: #eee;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --accent-border: #bfdbfe;
    --warn-bg: #fffbeb;
    --warn-fg: #92400e;
    --warn-border: #fde68a;
    --danger-bg: #fef2f2;
    --danger-fg: #991b1b;
    --mono: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
    --sans: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
    --radius: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg2: #242424;
      --fg: #e5e5e5;
      --fg2: #aaa;
      --fg3: #666;
      --border: #333;
      --border2: #2a2a2a;
      --accent: #60a5fa;
      --accent-bg: #1e293b;
      --accent-border: #334155;
      --warn-bg: #422006;
      --warn-fg: #fbbf24;
      --warn-border: #78350f;
      --danger-bg: #450a0a;
      --danger-fg: #fca5a5;
    }
  }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2rem 1rem;
    font-family: var(--sans);
    background: var(--bg);
    color: var(--fg);
    line-height: 1.6;
  }
  .wrap { max-width: 860px; margin: 0 auto; }
  h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 1.25rem; }

  /* info box */
  .info {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 0.85rem 1.1rem;
    margin-bottom: 1.25rem;
    font-size: 13px;
    color: var(--fg2);
  }
  .info a { color: var(--accent); }

  /* tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 1rem; }
  .tab {
    padding: 7px 18px;
    font-size: 12.5px;
    cursor: pointer;
    border: 1px solid var(--border2);
    border-radius: 6px;
    background: var(--bg2);
    color: var(--fg2);
    font-family: inherit;
  }
  .tab.active {
    background: var(--accent-bg);
    color: var(--accent);
    border-color: var(--accent-border);
  }

  /* dropzone */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 1rem;
  }
  .dropzone.over {
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .dropzone-icon { font-size: 28px; margin-bottom: 6px; opacity: 0.5; }
  .dropzone-label { font-size: 13.5px; color: var(--fg2); }
  .dropzone-file { margin-top: 8px; font-size: 12px; color: var(--fg3); }

  /* paste area */
  .paste-area {
    width: 100%;
    height: 140px;
    resize: vertical;
    font-family: var(--mono);
    font-size: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
    overflow-y: auto;
  }
  .paste-area:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .paste-info { font-size: 12px; color: var(--fg2); margin: 6px 0 8px; }

  /* buttons */
  .btn {
    padding: 7px 20px;
    font-size: 13px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg2);
    color: var(--fg);
    cursor: pointer;
    transition: background 0.1s;
  }
  .btn:hover { background: var(--accent-bg); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-row { display: flex; gap: 8px; align-items: center; margin: 10px 0; flex-wrap: wrap; }

  /* error */
  .error {
    padding: 10px 14px;
    background: var(--danger-bg);
    color: var(--danger-fg);
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 1rem;
    display: none;
  }
  .error.show { display: block; }

  /* status */
  .status { font-size: 13px; color: var(--fg2); margin-bottom: 1rem; display: none; }
  .status.show { display: block; }

  /* book tabs */
  .book-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
  .book-tab {
    padding: 5px 12px;
    font-size: 12px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    background: var(--bg2);
    color: var(--fg2);
    cursor: pointer;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: inherit;
  }
  .book-tab.active {
    background: var(--accent-bg);
    color: var(--accent);
    border-color: var(--accent-border);
  }
  .book-count { margin-left: 4px; opacity: 0.6; }

  /* result header */
  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .result-title { font-size: 13px; color: var(--fg2); }
  .warn-badge {
    display: inline-block;
    font-size: 12px;
    padding: 2px 10px;
    background: var(--warn-bg);
    color: var(--warn-fg);
    border: 1px solid var(--warn-border);
    border-radius: 6px;
    margin-left: 8px;
  }

  /* output */
  .output {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 1.25rem;
    font-size: 12.5px;
    font-family: var(--mono);
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--fg);
    line-height: 1.65;
    max-height: 520px;
    overflow-y: auto;
    margin: 0;
  }
  .hint { font-size: 12px; color: var(--fg3); margin-top: 8px; }

  /* results container */
  #results { display: none; }
  #results.show { display: block; }

  /* hidden */
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Kindle ハイライトパーサー</h1>

  <div class="info">
    <strong>使い方：</strong>
    <a href="https://read.amazon.co.jp/notebook" target="_blank" rel="noreferrer noopener">read.amazon.co.jp/notebook</a>
    を開き、Ctrl+A → Ctrl+C でコピーして「ペースト入力」に貼り付け。
    テキストが長い場合は .txt に保存して「ファイル入力」にドロップすると確実です。
  </div>

  <!-- mode tabs -->
  <div class="tabs">
    <button class="tab active" data-mode="file">ファイル入力</button>
    <button class="tab" data-mode="paste">ペースト入力</button>
  </div>

  <!-- file input -->
  <div id="file-panel">
    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">📄</div>
      <div class="dropzone-label">.txt / .html ファイルをドロップ、またはクリックして選択</div>
      <div class="dropzone-file" id="file-info"></div>
      <input type="file" id="file-input" accept=".txt,.text,.html,.htm" style="display:none">
    </div>
  </div>

  <!-- paste input -->
  <div id="paste-panel" class="hidden">
    <textarea class="paste-area" id="paste-area"
      placeholder="ここに Ctrl+V で貼り付け（自動パース）…"></textarea>
    <div class="paste-info" id="paste-info"></div>
    <div class="btn-row">
      <button class="btn" id="btn-reparse">再パース</button>
    </div>
  </div>

  <!-- error -->
  <div class="error" id="error"></div>

  <!-- status -->
  <div class="status" id="status"></div>

  <!-- results -->
  <div id="results">
    <div class="book-tabs" id="book-tabs"></div>
    <div class="result-header">
      <div>
        <span class="result-title" id="result-title"></span>
        <span class="warn-badge hidden" id="warn-badge"></span>
      </div>
      <div class="btn-row" style="margin:0">
        <button class="btn" id="btn-copy">コピー</button>
        <button class="btn" id="btn-download">.md 保存</button>
      </div>
    </div>
    <pre class="output" id="output"></pre>
    <p class="hint">Obsidian に貼り付けると <code>[!warning]</code> が黄色の callout として表示されます。</p>
  </div>
</div>

<script>
/* ============================================================
   Parser — 元ロジックそのまま
   ============================================================ */
const HIGHLIGHT_RE = /^(水色|黄色|ピンク色|オレンジ色|青色)のハイライト \| 位置: (\d+)/;
const DATE_RE = /^注釈の最終更新日:/;
const COUNT_RE = /^\d+ 個のハイライト/;
const NOISE_RE = /^エクスポートの制限に達したため/;

function extractBooks(rawText) {
  const idx = rawText.indexOf("メモ付きのKindle本:");
  if (idx === -1) return [];
  const section = rawText.substring(idx + "メモ付きのKindle本:".length);

  const lines = [];
  for (const l of section.split("\n")) {
    const t = l.trim();
    if (t.length > 0) lines.push(t);
  }

  const books = [];
  let cur = null, inHL = false, buf = [], trunc = false;

  function flush() {
    if (cur && buf.length > 0) {
      const text = buf.join(" ").replace(/\s+/g, " ").trim();
      if (text.length > 10) cur.highlights.push({ text, truncated: trunc });
    }
    buf = [];
    trunc = false;
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (NOISE_RE.test(line)) { if (inHL) trunc = true; else if (cur) cur.hasHidden = true; continue; }
    if (line === "オプション" || COUNT_RE.test(line) || DATE_RE.test(line)) continue;
    if (HIGHLIGHT_RE.test(line)) { flush(); inHL = true; continue; }

    const n1 = lines[i + 1] || "", n2 = lines[i + 2] || "";
    if (DATE_RE.test(n1) || DATE_RE.test(n2)) {
      flush(); inHL = false;
      let author = "";
      if (!DATE_RE.test(n1)) { author = n1; i++; }
      cur = { title: line, author, highlights: [], hasHidden: false };
      books.push(cur);
      continue;
    }
    if (inHL) buf.push(line);
  }
  flush();

  /* ── merge duplicate book entries & deduplicate highlights ──
     Kindle notebook pages often render highlights in multiple DOM
     containers (lazy-load, pagination, print view, etc.).
     Ctrl+A captures all of them, producing:
       - The same book title appearing multiple times → split entries
       - The same highlight text appearing multiple times within a book
     Fix both by merging same-title books, then deduplicating highlights. */
  const merged = new Map();
  for (const b of books) {
    const key = b.title;
    if (merged.has(key)) {
      const existing = merged.get(key);
      existing.highlights.push(...b.highlights);
      if (b.hasHidden) existing.hasHidden = true;
      if (!existing.author && b.author) existing.author = b.author;
    } else {
      merged.set(key, b);
    }
  }

  for (const b of merged.values()) {
    const seen = new Set();
    b.highlights = b.highlights.filter(h => {
      if (seen.has(h.text)) return false;
      seen.add(h.text);
      return true;
    });
  }

  return [...merged.values()].filter(b => b.highlights.length > 0);
}

function toMarkdown(book) {
  const p = [`# ${book.title}`];
  if (book.author) p.push(`著者: ${book.author}`);
  p.push("");
  if (book.hasHidden) {
    p.push("> [!info] 一部のハイライトが非表示");
    p.push("> エクスポート制限により表示されていないハイライトがあります。原文を確認してください。");
    p.push("");
  }
  for (const h of book.highlights) {
    p.push(`- ${h.text}`);
    if (h.truncated) {
      p.push("");
      p.push("> [!warning] 省略あり — 要確認");
      p.push("> このハイライトはエクスポート制限により途中で切れています。原文を確認して補記してください。");
    }
    p.push("");
  }
  return p.join("\n");
}

/* ============================================================
   UI
   ============================================================ */
const $ = id => document.getElementById(id);

const elFilePanel  = $("file-panel");
const elPastePanel = $("paste-panel");
const elDropzone   = $("dropzone");
const elFileInput  = $("file-input");
const elFileInfo   = $("file-info");
const elPasteArea  = $("paste-area");
const elPasteInfo  = $("paste-info");
const elError      = $("error");
const elStatus     = $("status");
const elResults    = $("results");
const elBookTabs   = $("book-tabs");
const elTitle      = $("result-title");
const elWarn       = $("warn-badge");
const elOutput     = $("output");
const btnCopy      = $("btn-copy");
const btnDownload  = $("btn-download");
const btnReparse   = $("btn-reparse");

let books = [];
let selected = 0;
let currentMd = "";

function fmtSize(b) {
  if (b < 1024) return b + " B";
  if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
  return (b / 1048576).toFixed(1) + " MB";
}

/* ── tabs ── */
document.querySelector(".tabs").addEventListener("click", e => {
  const btn = e.target.closest(".tab");
  if (!btn) return;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  const mode = btn.dataset.mode;
  elFilePanel.classList.toggle("hidden", mode !== "file");
  elPastePanel.classList.toggle("hidden", mode !== "paste");
});

/* ── dropzone ── */
elDropzone.addEventListener("click", () => elFileInput.click());
elDropzone.addEventListener("dragover", e => { e.preventDefault(); elDropzone.classList.add("over"); });
elDropzone.addEventListener("dragleave", () => elDropzone.classList.remove("over"));
elDropzone.addEventListener("drop", e => {
  e.preventDefault();
  elDropzone.classList.remove("over");
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});
elFileInput.addEventListener("change", () => {
  if (elFileInput.files[0]) loadFile(elFileInput.files[0]);
});

function loadFile(file) {
  elFileInfo.textContent = file.name + " (" + fmtSize(file.size) + ")";
  const reader = new FileReader();
  reader.onload = () => {
    const text = reader.result;
    // binary detection
    const sample = text.slice(0, 4096);
    let ctrl = 0;
    for (let i = 0; i < sample.length; i++) {
      const c = sample.charCodeAt(i);
      if (c < 9 || (c > 13 && c < 32)) ctrl++;
    }
    if (sample.length > 0 && ctrl / sample.length > 0.01) {
      showError("このファイルはテキストファイルではないようです。.txt または .html を選択してください。");
      return;
    }
    runParse(text);
  };
  reader.onerror = () => showError("ファイルの読み込みに失敗しました。");
  reader.readAsText(file, "utf-8");
}

/* ── paste ── */
elPasteArea.addEventListener("paste", e => {
  const text = e.clipboardData.getData("text/plain");
  if (!text) return;
  // Don't prevent default — let the textarea handle it natively.
  // Just schedule parse after the value is updated.
  setTimeout(() => {
    elPasteInfo.textContent = "(" + fmtSize(new Blob([text]).size) + " 貼り付け済み — " + text.split("\n").length.toLocaleString() + " 行)";
    runParse(elPasteArea.value);
  }, 0);
});

btnReparse.addEventListener("click", () => {
  if (elPasteArea.value.trim()) runParse(elPasteArea.value);
});

/* ── parse ── */
let parseGen = 0;

function runParse(text) {
  hideError();
  elResults.classList.remove("show");
  elStatus.classList.add("show");
  elStatus.textContent = "パース中…";

  const gen = ++parseGen;

  setTimeout(() => {
    if (gen !== parseGen) return;
    try {
      const result = extractBooks(text);
      elStatus.classList.remove("show");
      if (result.length === 0) {
        showError("ハイライトが見つかりませんでした。read.amazon.co.jp/notebook のテキストを貼り付けるか、.txt をドロップしてください。");
        return;
      }
      books = result;
      selected = 0;
      renderBookTabs();
      renderOutput();
      elResults.classList.add("show");
    } catch (e) {
      elStatus.classList.remove("show");
      showError("パースエラー: " + e.message);
    }
  }, 0);
}

/* ── render ── */
function renderBookTabs() {
  elBookTabs.innerHTML = "";
  if (books.length <= 1) return;
  books.forEach((b, i) => {
    const btn = document.createElement("button");
    btn.className = "book-tab" + (i === selected ? " active" : "");
    const label = b.title.length > 28 ? b.title.slice(0, 28) + "…" : b.title;
    // Use textContent — never innerHTML with user data
    btn.textContent = label;
    const span = document.createElement("span");
    span.className = "book-count";
    span.textContent = "(" + b.highlights.length + ")";
    btn.appendChild(span);
    btn.addEventListener("click", () => { selected = i; renderBookTabs(); renderOutput(); });
    elBookTabs.appendChild(btn);
  });
}

function renderOutput() {
  const book = books[selected];
  if (!book) return;
  currentMd = toMarkdown(book);

  elTitle.textContent = book.title + " — " + book.highlights.length + "件";

  const trCount = book.highlights.filter(h => h.truncated).length;
  if (trCount > 0) {
    elWarn.textContent = "省略あり " + trCount + "箇所";
    elWarn.classList.remove("hidden");
  } else {
    elWarn.classList.add("hidden");
  }

  // textContent — safe, no XSS
  elOutput.textContent = currentMd;

  // summary line
  const total = books.reduce((s, b) => s + b.highlights.length, 0);
  elStatus.textContent = books.length + "冊 / 合計" + total.toLocaleString() + "件";
  elStatus.classList.add("show");

  btnCopy.textContent = "コピー";
}

/* ── copy ── */
btnCopy.addEventListener("click", async () => {
  if (!currentMd) return;
  try {
    await navigator.clipboard.writeText(currentMd);
  } catch {
    const ta = document.createElement("textarea");
    ta.value = currentMd;
    ta.style.cssText = "position:fixed;opacity:0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  }
  btnCopy.textContent = "コピー済み ✓";
  setTimeout(() => { btnCopy.textContent = "コピー"; }, 2000);
});

/* ── download ── */
btnDownload.addEventListener("click", () => {
  if (!currentMd || !books[selected]) return;
  const blob = new Blob([currentMd], { type: "text/markdown;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = books[selected].title.replace(/[/\\?%*:|"<>]/g, "_").slice(0, 80) + ".md";
  a.click();
  URL.revokeObjectURL(url);
});

/* ── helpers ── */
function showError(msg) { elError.textContent = msg; elError.classList.add("show"); }
function hideError() { elError.classList.remove("show"); }
</script>
</body>
</html>
